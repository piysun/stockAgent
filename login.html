<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login | EMA Screener</title>
  <meta name="description" content="Sign in to EMA Screener — NSE Stock Analysis Platform"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #060b14;
      --card:    rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.08);
      --green:   #00d4aa;
      --purple:  #a855f7;
      --yellow:  #f6c90e;
      --red:     #ff4d6d;
      --text:    #f0f6ff;
      --muted:   #8892a4;
      --font:    'Inter', sans-serif;
      --mono:    'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── ANIMATED BG ── */
    .bg-wrap {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
    }
    .bg-orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.18; animation: drift 14s ease-in-out infinite alternate;
    }
    .bg-orb.o1 { width:600px; height:600px; background:radial-gradient(#00d4aa,transparent 70%); top:-10%; left:-10%; animation-delay:0s; }
    .bg-orb.o2 { width:500px; height:500px; background:radial-gradient(#7c3aed,transparent 70%); bottom:-10%; right:-10%; animation-delay:-5s; }
    .bg-orb.o3 { width:400px; height:400px; background:radial-gradient(#f6c90e,transparent 70%); top:50%; left:50%; transform:translate(-50%,-50%); animation-delay:-8s; }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,40px) scale(1.08); }
    }

    /* ── GRID ── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* ── PARTICLES ── */
    .particle {
      position: absolute; border-radius: 50%; opacity: 0.12;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(105vh) scale(0); opacity:0; }
      10%  { opacity: 0.12; }
      90%  { opacity: 0.12; }
      100% { transform: translateY(-60px) scale(1); opacity:0; }
    }

    /* ── LAYOUT ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    /* ── CARD ── */
    .login-card {
      width: 100%; max-width: 440px;
      background: rgba(6,11,20,0.75);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 44px 40px;
      backdrop-filter: blur(24px);
      box-shadow: 0 24px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04) inset;
      animation: cardIn .7s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(32px) scale(.97); }
      to   { opacity:1; transform: translateY(0)    scale(1);   }
    }

    /* ── LOGO ── */
    .login-logo {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      margin-bottom: 34px;
    }
    .logo-ring {
      width: 72px; height: 72px; border-radius: 20px;
      background: linear-gradient(135deg, rgba(0,212,170,.2), rgba(124,58,237,.2));
      border: 1px solid rgba(0,212,170,.3);
      display: flex; align-items: center; justify-content: center;
      position: relative;
      animation: logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,212,170,0); }
      50%      { box-shadow: 0 0 0 12px rgba(0,212,170,0.07); }
    }
    .logo-title {
      font-size: 26px; font-weight: 800; letter-spacing: -0.8px;
    }
    .logo-title span { color: var(--green); }
    .logo-sub { font-size: 13px; color: var(--muted); }

    /* ── BADGE ── */
    .login-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 14px; border-radius: 100px;
      background: rgba(0,212,170,.08); border: 1px solid rgba(0,212,170,.2);
      font-size: 12px; font-weight: 500; color: var(--green);
      margin-bottom: 28px;
    }

    /* ── FORM ── */
    .form-group { margin-bottom: 20px; }

    .form-label {
      display: block;
      font-size: 12px; font-weight: 600; letter-spacing: .6px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 9px;
    }

    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 17px; pointer-events: none; line-height: 1;
    }
    .form-input {
      width: 100%;
      padding: 13px 14px 13px 44px;
      background: rgba(255,255,255,.04);
      border: 1.5px solid rgba(255,255,255,.08);
      border-radius: 12px;
      color: var(--text);
      font-family: var(--font); font-size: 15px;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .form-input::placeholder { color: rgba(255,255,255,.2); }
    .form-input:focus {
      border-color: rgba(0,212,170,.5);
      background: rgba(0,212,170,.04);
      box-shadow: 0 0 0 4px rgba(0,212,170,.07);
    }
    .form-input.error {
      border-color: rgba(255,77,109,.5);
      background: rgba(255,77,109,.04);
      box-shadow: 0 0 0 4px rgba(255,77,109,.07);
    }
    /* Eye toggle */
    .eye-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 18px; padding: 4px; line-height: 1;
      transition: color .2s;
    }
    .eye-btn:hover { color: var(--text); }

    /* ── ERROR MSG ── */
    .error-msg {
      display: none;
      align-items: center; gap: 8px;
      padding: 12px 16px;
      background: rgba(255,77,109,.1);
      border: 1px solid rgba(255,77,109,.3);
      border-radius: 10px;
      font-size: 13px; color: #ff4d6d;
      margin-bottom: 20px;
      animation: shake .4s cubic-bezier(.36,.07,.19,.97);
    }
    .error-msg.show { display: flex; }
    @keyframes shake {
      0%,100%{ transform:translateX(0); }
      20%    { transform:translateX(-8px); }
      40%    { transform:translateX(8px); }
      60%    { transform:translateX(-5px); }
      80%    { transform:translateX(5px); }
    }

    /* ── BUTTON ── */
    .btn-login {
      width: 100%;
      padding: 15px;
      border: none; border-radius: 12px;
      background: linear-gradient(135deg, #00d4aa, #009d7f 60%, #7c3aed);
      color: #fff;
      font-family: var(--font); font-size: 16px; font-weight: 700;
      cursor: pointer; letter-spacing: .3px;
      transition: all .25s;
      position: relative; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,212,170,.25);
    }
    .btn-login::before {
      content:''; position:absolute; inset:0;
      background: linear-gradient(135deg,rgba(255,255,255,.12),transparent);
      opacity:0; transition: opacity .2s;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,212,170,.4); }
    .btn-login:hover::before { opacity:1; }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity:.6; cursor:not-allowed; transform:none; }

    /* Spinner */
    .btn-spinner {
      display: none; width:20px; height:20px;
      border: 2.5px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    .login-footer {
      margin-top: 28px; text-align: center;
      font-size: 12px; color: var(--muted); line-height: 1.7;
    }
    .login-footer strong { color: rgba(255,255,255,.5); }

    /* ── SUCCESS OVERLAY ── */
    .success-overlay {
      display: none; position: fixed; inset: 0;
      background: var(--bg); z-index: 9999;
      flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      animation: fadeIn .4s both;
    }
    .success-overlay.show { display: flex; }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    .success-icon {
      font-size: 64px;
      animation: popIn .5s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity:0; }
      to   { transform: scale(1); opacity:1; }
    }
    .success-text { font-size: 22px; font-weight: 700; }
    .success-sub  { font-size: 14px; color: var(--muted); }
    .success-bar  {
      width: 200px; height: 4px;
      background: rgba(255,255,255,.08); border-radius: 100px; overflow: hidden;
      margin-top: 8px;
    }
    .success-fill {
      height: 100%; border-radius: 100px;
      background: linear-gradient(90deg, var(--green), var(--purple));
      animation: fillBar 1.4s cubic-bezier(.16,1,.3,1) both;
      animation-delay: .2s;
    }
    @keyframes fillBar { from{width:0%} to{width:100%} }

    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg-wrap" id="bgWrap">
    <div class="bg-orb o1"></div>
    <div class="bg-orb o2"></div>
    <div class="bg-orb o3"></div>
  </div>
  <div class="bg-grid"></div>

  <!-- Page -->
  <div class="page">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-ring">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none">
            <path d="M3 17L9 11L13 15L21 7" stroke="url(#lg)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="lg" x1="3" y1="17" x2="21" y2="7" gradientUnits="userSpaceOnUse">
                <stop stop-color="#00d4aa"/><stop offset="1" stop-color="#7c3aed"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div>
          <div class="logo-title">EMA <span>Screener</span></div>
          <div class="logo-sub">NSE Stock Intelligence Platform</div>
        </div>
      </div>

      <div class="login-badge">🔐 Secure Access Required</div>

      <!-- Error -->
      <div class="error-msg" id="errorMsg">
        <span>⚠️</span>
        <span id="errorText">Invalid username or password. Please try again.</span>
      </div>

      <!-- Form -->
      <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="off">

        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input
              type="text" id="username" class="form-input"
              placeholder="Enter your username"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔑</span>
            <input
              type="password" id="password" class="form-input"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="eye-btn" id="eyeBtn" onclick="togglePwd()" title="Show/hide password">👁</button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span id="btnText">Sign In →</span>
          <div class="btn-spinner" id="btnSpinner"></div>
        </button>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        <strong>EMA Screener v2.0</strong> · NSE India Data<br/>
        Double EMA Crossover Scanner &amp; Portfolio Tracker
      </div>

    </div>
  </div>

  <!-- Success Overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-icon">✅</div>
    <div class="success-text">Welcome back, <span id="welcomeName" style="color:var(--green)"></span>!</div>
    <div class="success-sub">Redirecting to dashboard…</div>
    <div class="success-bar"><div class="success-fill"></div></div>
  </div>

  <script>
  "use strict";

  const AUTH_KEY  = "ema_auth_session";
  const VALID_USER = "Peeyush";
  const VALID_PASS = "samir28";

  // ── If already logged in, redirect immediately ──
  (function() {
    const session = sessionStorage.getItem(AUTH_KEY) || localStorage.getItem(AUTH_KEY);
    if (session === "1") {
      window.location.replace("index.html");
    }
  })();

  // ── Particles ──
  (function() {
    const wrap   = document.getElementById("bgWrap");
    const colors = ["#00d4aa","#7c3aed","#f6c90e","#ff6b35","#3b82f6"];
    for (let i = 0; i < 18; i++) {
      const p   = document.createElement("div");
      p.className = "particle";
      const sz  = Math.random() * 5 + 2;
      const col = colors[Math.floor(Math.random() * colors.length)];
      p.style.cssText = `
        width:${sz}px; height:${sz}px;
        left:${Math.random()*100}%;
        background:${col}; box-shadow:0 0 ${sz*3}px ${col};
        animation-duration:${12+Math.random()*20}s;
        animation-delay:${Math.random()*18}s;
      `;
      wrap.appendChild(p);
    }
  })();

  // ── Password visibility toggle ──
  function togglePwd() {
    const inp = document.getElementById("password");
    const btn = document.getElementById("eyeBtn");
    if (inp.type === "password") {
      inp.type = "text";
      btn.textContent = "🙈";
    } else {
      inp.type = "password";
      btn.textContent = "👁";
    }
  }

  // ── Remove error state on typing ──
  document.getElementById("username").addEventListener("input", clearError);
  document.getElementById("password").addEventListener("input", clearError);

  function clearError() {
    document.getElementById("errorMsg").classList.remove("show");
    document.getElementById("username").classList.remove("error");
    document.getElementById("password").classList.remove("error");
  }

  // ── Handle login ──
  function handleLogin(e) {
    e.preventDefault();
    clearError();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("loginBtn");
    const btnText  = document.getElementById("btnText");
    const spinner  = document.getElementById("btnSpinner");

    // Show loading
    btn.disabled      = true;
    btnText.style.display  = "none";
    spinner.style.display  = "block";

    // Simulate slight auth delay for realism
    setTimeout(() => {
      if (username === VALID_USER && password === VALID_PASS) {
        // ── SUCCESS ──
        sessionStorage.setItem(AUTH_KEY, "1");
        localStorage.setItem(AUTH_KEY, "1");

        btn.disabled         = false;
        btnText.style.display = "block";
        spinner.style.display = "none";

        document.getElementById("welcomeName").textContent = username;
        document.getElementById("successOverlay").classList.add("show");

        // Redirect after progress bar fills (≈1.6s)
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1650);

      } else {
        // ── FAILURE ──
        btn.disabled         = false;
        btnText.style.display = "block";
        spinner.style.display = "none";

        const errMsg = document.getElementById("errorMsg");
        const errTxt = document.getElementById("errorText");

        if (username !== VALID_USER && password !== VALID_PASS) {
          errTxt.textContent = "Invalid username and password. Please check your credentials.";
        } else if (username !== VALID_USER) {
          errTxt.textContent = "Username not found. Please check your username.";
        } else {
          errTxt.textContent = "Incorrect password. Please try again.";
        }

        errMsg.classList.add("show");
        document.getElementById("username").classList.add("error");
        document.getElementById("password").classList.add("error");

        // Reset error animation
        errMsg.style.animation = "none";
        void errMsg.offsetWidth;
        errMsg.style.animation = "";

        document.getElementById("password").value = "";
        document.getElementById("password").focus();
      }
    }, 800);
  }
  </script>
</body>
</html>
